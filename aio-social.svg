<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5dea0"></stop>
      <stop offset="45%" stop-color="#d4a858"></stop>
      <stop offset="100%" stop-color="#8f6321"></stop>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="rgba(212,168,88,.22)"></stop>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"></stop>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="rgba(0,0,0,0)"></stop>
      <stop offset="100%" stop-color="rgba(0,0,0,.7)"></stop>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="rgba(212,168,88,.14)"></circle>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="#0b0f1a"></rect>
  <rect width="1280" height="640" fill="url(#dots)"></rect>
  <rect width="1280" height="640" fill="url(#spot)"></rect>

  
  <g font-family="&#39;JetBrains Mono&#39;,monospace" font-size="16" fill="#a6772e" letter-spacing="5">
    <text x="640" y="130" text-anchor="middle" opacity=".9">A L L — I N — O N E   A I   S K I L L</text>
  </g>
  <line x1="500" y1="150" x2="780" y2="150" stroke="url(#gold)" stroke-width=".6" opacity=".5"></line>

  
  <g font-family="&#39;Inter&#39;,&#39;Helvetica Neue&#39;,sans-serif" font-weight="700" fill="#f5dea0">
    <text x="380" y="360" text-anchor="middle" font-size="240" letter-spacing="-8">1</text>
    <text x="640" y="360" text-anchor="middle" font-size="180" fill="#d4a858" letter-spacing="0">→</text>
    <text x="900" y="360" text-anchor="middle" font-size="240" letter-spacing="-8">11</text>
  </g>

  
  <text x="640" y="440" text-anchor="middle" font-family="&#39;Inter&#39;,&#39;Helvetica Neue&#39;,sans-serif" font-weight="500" font-size="36" letter-spacing="-.5" fill="#f5dea0">One skill replaces eleven.</text>

  <text x="640" y="484" text-anchor="middle" font-family="&#39;Inter&#39;,&#39;Helvetica Neue&#39;,sans-serif" font-weight="400" font-size="22" letter-spacing=".2" fill="#cdb98a" opacity=".85">Portable across every agent that speaks SKILL.md.</text>

  
  <g font-family="&#39;JetBrains Mono&#39;,monospace" font-size="13" fill="#a6772e" letter-spacing="3.5">
    <text x="640" y="570" text-anchor="middle" opacity=".8">
      Claude Code · Codex · Cursor · Copilot · Gemini · Windsurf · Trae · Cline · Roo
    </text>
  </g>

  <rect width="1280" height="640" fill="url(#vig)" pointer-events="none"></rect>
</svg>